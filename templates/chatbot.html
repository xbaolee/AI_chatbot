<!DOCTYPE html>
<html>
<head>
  <title>Chatbot</title>
  <link
    rel="stylesheet"
    href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css"
    integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO"
    crossorigin="anonymous"
  />
  <link
    rel="stylesheet"
    href="https://use.fontawesome.com/releases/v5.5.0/css/all.css"
    integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU"
    crossorigin="anonymous"
  />
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <link
    rel="stylesheet"
    type="text/css"
    href="{{ url_for('static', filename='styles.css') }}"
  />
</head>
<body>
  <div class="container-fluid h-100">
    <div class="row justify-content-center h-100">
      <div class="col-md-8 col-xl-6 chat">
        <div class="card">
          <div class="card-header msg_head">
            <div class="d-flex bd-highlight">
              <div class="img_cont">
                <img
                  src="https://i.ibb.co/fSNP7Rz/icons8-chatgpt-512.png"
                  class="rounded-circle user_img"
                />
                <span class="online_icon"></span>
              </div>
              <div class="user_info">
                <span>ChatBot</span>
                <p>Ask me anything! (Using <id="currentModel">Neural Network)</p>
              </div>
              <div class="model_select">
                <select id="modelSelect" class="form-control">
                  <option value="neural_network" selected>Neural Network</option>
                  <option value="knn">KNN</option>
                  <option value="random_forest">Random Forest</option>
                  <option value="decision_tree">Decision Tree</option>
                </select>
              </div>
            </div>
            <!-- Notification for model change -->
            <div id="modelNotification" class="model-notification" style="display: none;">
              Model switched to <span id="modelName"></span>
            </div>
          </div>
          <div id="messageFormeight" class="card-body msg_card_body"></div>
          <div class="card-footer">
            <form id="messageArea" class="input-group">
              <input
                type="text"
                id="text"
                name="msg"
                placeholder="Type your message..."
                autocomplete="off"
                class="form-control type_msg"
                required
              />
              <div class="input-group-append">
                <button
                  type="submit"
                  id="send"
                  class="input-group-text send_btn"
                >
                  <i class="fas fa-location-arrow"></i>
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function scrollToBottom() {
      var messageBody = document.getElementById("messageFormeight");
      messageBody.scrollTop = messageBody.scrollHeight;
    }

    // Function to speak the text
    function speakText(text) {
      var utterance = new SpeechSynthesisUtterance(text);
      window.speechSynthesis.speak(utterance);
    }

    $(document).ready(function () {
      // Show notification when the model is changed
      $("#modelSelect").on("change", function () {
        var selectedModel = $("#modelSelect option:selected").text();
        $("#modelName").text(selectedModel);
        $("#currentModel").text(selectedModel); // Update the permanent display
        $("#modelNotification").fadeIn().delay(1000).fadeOut(); // Show temporary notification
      });

      $("#messageArea").on("submit", function (event) {
        const date = new Date();
        const hour = date.getHours();
        const minute = date.getMinutes();
        const str_time = hour + ":" + minute;
        var rawText = $("#text").val();
        var selectedModel = $("#modelSelect").val(); // Get selected model

        var userHtml =
          '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' +
          rawText +
          '<span class="msg_time_send">' +
          str_time +
          '</span></div><div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg"></div></div>';

        $("#text").val("");
        $("#messageFormeight").append(userHtml);

        scrollToBottom();

        $.ajax({
          data: {
            msg: rawText,
            model: selectedModel, // Send selected model
          },
          type: "POST",
          url: "/get",
        }).done(function (data) {
          var botHtml =
            '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://i.ibb.co/fSNP7Rz/icons8-chatgpt-512.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' +
            data.response +
            '<span class="msg_time">' +
            str_time +
            '</span>' +
            // Add the speaker icon
            '<i class="fas fa-volume-up speaker-icon" style="margin-left: 10px; cursor: pointer;" onclick="speakText(\'' +
            data.response.replace(/'/g, "\\'") +
            '\')"></i></div></div>';
          $("#messageFormeight").append($.parseHTML(botHtml));
          scrollToBottom();
        });
        event.preventDefault();
      });
    });
  </script>
</body>
</html>
