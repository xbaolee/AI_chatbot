<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Support Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="chatbot-container">
            <div class="chatbot-header">
                <h1>🤖 Customer Support Assistant</h1>
                <p>How can we help you today?</p>
            </div>
            
            <div class="chatbot-messages" id="chatMessages">
                <div class="message bot-message">
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        Hello! I'm your AI Customer Support Assistant. How can I help you today?
                    </div>
                </div>
            </div>
            
            <div class="chatbot-input-area">
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="userInput" 
                        placeholder="Type your message here..." 
                        autocomplete="off"
                    >
                    <button id="sendBtn" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <div class="suggestions">
                    <button class="suggestion-btn" onclick="sendMessage('What is your return policy?')">Return Policy</button>
                    <button class="suggestion-btn" onclick="sendMessage('How do I track my order?')">Track Order</button>
                    <button class="suggestion-btn" onclick="sendMessage('I have a problem with my order')">Report Issue</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const chatMessages = document.getElementById('chatMessages');

        // Send message on button click
        sendBtn.addEventListener('click', sendMessage);

        // Send message on Enter key
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        function sendMessage(message = null) {
            const text = message || userInput.value.trim();
            
            if (!text) return;

            // Add user message to chat
            addMessageToChat(text, 'user');
            userInput.value = '';

            // Send to backend
            fetch('/chat', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ message: text })
            })
            .then(response => response.json())
            .then(data => {
                addMessageToChat(data.response, 'bot');
            })
            .catch(error => {
                console.error('Error:', error);
                addMessageToChat('Sorry, I encountered an error. Please try again.', 'bot');
            });
        }

        function addMessageToChat(message, senderType) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${senderType}-message`;

            const avatar = senderType === 'bot' ? '🤖' : '👤';
            messageDiv.innerHTML = `
                <div class="message-avatar">${avatar}</div>
                <div class="message-content">${escapeHtml(message)}</div>
            `;

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Focus on input field on page load
        userInput.focus();
    </script>
</body>
</html>
